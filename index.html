<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./styles.css">
  <title>Frontend Mentor | Results summary component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>
  <main class="results-summary">
    <section class="result-box">
      <h1 class="title">Your Result</h1>
      <div class="score-display">
        <p class="score-main">76</p>
        <p class="score-total">of 100</p>
      </div>

      <p class="result-grade">Great</p>
      <p class="result-desc">You scored higher than 65% of the people who have taken these tests.</p>

    </section>
    <section class="summary">
      <h2 class="summary-title">Summary</h2>
      <ul class="summary-list">
        <li class="summary-item reaction">
          <img src="assets/images/icon-reaction.svg" alt="Reaction icon">
          <p>Reaction</p>
          <p class="score"> 80 / 100</p>
        </li>
        <li class="summary-item memory">
          <img src="assets/images/icon-memory.svg" alt="Memory icon">
          <p>Memory</p>
          <p class="score"> 92 / 100</p>
        </li>
        <li class="summary-item verbal">
          <img src="assets/images/icon-verbal.svg" alt="Verbal icon">
          <p>Verbal</p>
          <p class="score"> 61 / 100</p>
        </li>
        <li class="summary-item visual">
          <img src="assets/images/icon-visual.svg" alt="Visual icon">
          <p>Visual</p>
          <p class="score"> 73 / 100</p>
        </li>
      </ul>

    </section>

  </main>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Arjun</a>.
  </div>
</body>

</html>
